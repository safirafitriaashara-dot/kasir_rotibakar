<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Pendapatan Roti Bakar FIRAFLI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fa;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2, h3 {
            text-align: center;
            color: #d35400;
            margin-top: 0;
        }
        .total-box {
            background: #e67e22;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-harga {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-harga:active {
            transform: scale(0.95);
            background-color: #e67e22;
        }
        .history {
            border-top: 2px solid #eee;
            padding-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .btn-reset {
            width: 100%;
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍞 Roti Bakar "FIRAFLI"</h2>
    
    <div class="total-box">
        Total: Rp <span id="total-pendapatan">0</span>
    </div>

    <h3>Klik Harga Terjual:</h3>
    <div class="price-grid">
        <button class="btn-harga" onclick="tambahPendapatan(10000)">+ Rp 10.000</button>
        <button class="btn-harga" onclick="tambahPendapatan(13000)">+ Rp 13.000</button>
        <button class="btn-harga" onclick="tambahPendapatan(14000)">+ Rp 14.000</button>
        <button class="btn-harga" onclick="tambahPendapatan(15000)">+ Rp 15.000</button>
        <button class="btn-harga" onclick="tambahPendapatan(16000)">+ Rp 16.000</button>
        <button class="btn-harga" onclick="tambahPendapatan(17000)">+ Rp 17.000</button>
        <button class="btn-harga" onclick="tambahPendapatan(18000)">+ Rp 18.000</button>
        <button class="btn-harga" onclick="tambahPendapatan(19000)">+ Rp 19.000</button>
        <button class="btn-harga" style="grid-column: span 2;" onclick="tambahPendapatan(20000)">+ Rp 20.000</button>
    </div>

    <h3>Riwayat Penjualan Hari Ini:</h3>
    <div class="history" id="riwayat-list">
        <!-- Riwayat akan muncul di sini -->
    </div>

    <button class="btn-reset" onclick="resetData()">Kosongkan / Mulai Hari Baru</button>
</div>

<script>
    let total = parseInt(localStorage.getItem('totalRoti')) || 0;
    let riwayat = JSON.parse(localStorage.getItem('riwayatRoti')) || [];

    updateTampilan();

    function tambahPendapatan(harga) {
        total += harga;
        
        let sekarang = new Date();
        let waktu = sekarang.getHours().toString().padStart(2, '0') + ':' + sekarang.getMinutes().toString().padStart(2, '0');
        
        riwayat.unshift({ harga: harga, waktu: waktu });

        simpanData();
        updateTampilan();
    }

    function updateTampilan() {
        document.getElementById('total-pendapatan').innerText = total.toLocaleString('id-ID');
        
        let htmlRiwayat = '';
        riwayat.forEach((item) => {
            htmlRiwayat += `<div class="history-item">
                                <span>Roti Bakar Terjual (${item.waktu})</span>
                                <strong>+ Rp ${item.harga.toLocaleString('id-ID')}</strong>
                            </div>`;
        });
        document.getElementById('riwayat-list').innerHTML = htmlRiwayat;
    }

    function simpanData() {
        localStorage.setItem('totalRoti', total);
        localStorage.setItem('riwayatRoti', JSON.stringify(riwayat));
    }

    function resetData() {
        if (confirm("Apakah Anda yakin ingin menghapus semua catatan pendapatan hari ini?")) {
            total = 0;
            riwayat = [];
            localStorage.clear();
            updateTampilan();
        }
    }
</script>

</body>
</html>
