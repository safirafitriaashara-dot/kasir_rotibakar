<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Pendapatan Roti Bakar FIRAFLI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fa;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2, h3 {
            text-align: center;
            color: #d35400;
            margin-top: 0;
        }
        .total-box {
            background: #e67e22;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-harga {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-harga:active {
            transform: scale(0.95);
            background-color: #e67e22;
        }
        .history {
            border-top: 2px solid #eee;
            padding-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .badge-biji {
            background-color: #e8f6f3;
            color: #16a085;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 5px;
        }
        .btn-reset {
            width: 100%;
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍞 Roti Bakar "FIRAFLI"</h2>
    
    <div class="total-box">
        Total: Rp <span id="total-pendapatan">0</span>
    </div>

    <h3>Klik Harga Terjual:</h3>
    <div class="price-grid" id="grid-container">
        <!-- Tombol dibuat otomatis oleh JavaScript agar kodenya rapi -->
    </div>

    <h3>Riwayat Penjualan Hari Ini:</h3>
    <div class="history" id="riwayat-list">
        <!-- Riwayat akan muncul di sini -->
    </div>

    <button class="btn-reset" onclick="resetData()">Kosongkan / Mulai Hari Baru</button>
</div>

<script>
    // KONFIGURASI DAFTAR HARGA
    // Urutan ini yang akan muncul di tombol dan di riwayat
    const hargaList = [10000, 13000, 14000, 15000, 16000, 17000, 18000, 19000, 20000];

    // Variabel Global
    let total = 0;
    
    // Objek untuk menyimpan jumlah terjual per harga. Contoh: { 10000: 2, 13000: 1 }
    let jumlahTerjual = {}; 

    // Ambil data dari localStorage jika ada
    function ambilDataAwal() {
        const savedTotal = localStorage.getItem('totalRotiFira');
        const savedCount = localStorage.getItem('countRotiFira');

        if (savedTotal) total = parseInt(savedTotal);
        if (savedCount) {
            jumlahTerjual = JSON.parse(savedCount);
        } else {
            // Jika belum ada data, set semua harga menjadi 0
            hargaList.forEach(h => jumlahTerjual[h] = 0);
        }
    }

    // Fungsi membuat tombol otomatis
    function buatTombol() {
        const container = document.getElementById('grid-container');
        container.innerHTML = ''; // Bersihkan container

        hargaList.forEach(harga => {
            const btn = document.createElement('button');
            btn.className = 'btn-harga';
            btn.innerText = '+ Rp ' + harga.toLocaleString('id-ID');
            
            // Khusus tombol 20.000, lebar penuh (span 2 kolom)
            if (harga === 20000) {
                btn.style.gridColumn = "span 2";
            }

            btn.onclick = () => tambahPendapatan(harga);
            container.appendChild(btn);
        });
    }

    function tambahPendapatan(harga) {
        total += harga;
        jumlahTerjual[harga] = (jumlahTerjual[harga] || 0) + 1;

        simpanData();
        updateTampilan();
    }

    function updateTampilan() {
        // Update Total Uang
        document.getElementById('total-pendapatan').innerText = total.toLocaleString('id-ID');
        
        // Update Riwayat
        const listContainer = document.getElementById('riwayat-list');
        let htmlRiwayat = '';

        // Kita loop berdasarkan urutan hargaList agar urutannya rapi
        hargaList.forEach(harga => {
            const count = jumlahTerjual[harga] || 0;

            // Hanya tampilkan jika jumlah terjual lebih dari 0
            if (count > 0) {
                htmlRiwayat += `
                    <div class="history-item">
                        <span>Rp ${harga.toLocaleString('id-ID')}</span>
                        <div>
                            <span class="badge-biji">${count} biji</span>
                            <strong>Rp ${(harga * count).toLocaleString('id-ID')}</strong>
                        </div>
                    </div>`;
            }
        });

        if (htmlRiwayat === '') {
            htmlRiwayat = '<p style="text-align:center; color:#999;">Belum ada penjualan hari ini.</p>';
        }

        listContainer.innerHTML = htmlRiwayat;
    }

    function simpanData() {
        localStorage.setItem('totalRotiFira', total);
        localStorage.setItem('countRotiFira', JSON.stringify(jumlahTerjual));
    }

    function resetData() {
        if (confirm("Apakah Anda yakin ingin menghapus semua catatan pendapatan hari ini?")) {
            total = 0;
            // Reset counter semua harga menjadi 0
            hargaList.forEach(h => jumlahTerjual[h] = 0);
            
            localStorage.removeItem('totalRotiFira');
            localStorage.removeItem('countRotiFira');
            
            updateTampilan();
        }
    }

    // Jalankan saat halaman dibuka
    ambilDataAwal();
    buatTombol();
    updateTampilan();
</script>

</body>
</html>
